server:
    port: 9092

spring:
    profiles:
        active: native
    application:
        name: mcsv-auth

    config:
        import: "configserver:"

    cloud:
        config:
            uri: ${CONFIG_SERVER_URI:http://localhost:8888}
        openfeign:
            client:
                config:
                    default:
                        connect-timeout: 5000
                        read-timeout: 10000
                        logger-level: basic
            circuitbreaker:
                enabled: true

info:
    app:
        name: Authorizer Server microservice
        description: microservices for Authorization
        version: 1.0.0

# Documentation
openapi:
    service:
        title: authorizer-service doc #title that you will want to display in the swagger ui
        version: 1.0.0
        url: ${URLAPI:http://localhost:9090}/v1/api/auth #api gateway url

springdoc:
    api-docs:
        path: /api/api-docs/auth #these urls will use to load the swagger ui of this service by the api gateway
    swagger-ui:
        path: /api/auth/swagger-ui.html

url:
    recuperar-password: ${URL_FRONT:localhost:4200}

cookie:
    secure: ${COOKIE_SECURE:false}
    same-site: ${COOKIE_SAME_SITE:Lax}
    domain: ${COOKIE_DOMAIN:}
    path: /
    access-token-max-age: 28800
    refresh-token-max-age: 604800

azure:
    tenant-id: AZURE_TENANT_ID
    client-id: YOUR_CLIENT_ID
    jwks-uri: https://login.microsoftonline.com/${azure.tenant-id}/discovery/v2.0/keys
    issuer: https://login.microsoftonline.com/${azure.tenant-id}/v2.0

aws:
    region: ${AWS_REGION:us-east-1}
    access-key: ${AWS_ACCESS_KEY:}
    secret-key: ${AWS_SECRET_KEY:}
    sqs:
        enabled: true
        email-queue-url: ${AWS_SQS_EMAIL_QUEUE_URL}
    eventbridge:
        enabled: true
        bus-name: ${AWS_EVENTBRIDGE_BUS_NAME:crm-events}

github:
    oauth2:
        client-id: ${GITHUB_CLIENT_ID:}
        client-secret: ${GITHUB_CLIENT_SECRET:}
        redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:9090/v1/api/auth/oauth2/github/callback}
        scope: user:email
        frontend-success-url: ${URL_FRONT:http://localhost:4200}/dashboard

resilience4j:
    timelimiter:
        configs:
            default:
                timeout-duration: 10s
    circuitbreaker:
        instances:
            mcsv-user:
                sliding-window-size: 10
                failure-rate-threshold: 50
                wait-duration-in-open-state: 30s
                permitted-number-of-calls-in-half-open-state: 3
                slow-call-duration-threshold: 2s
                slow-call-rate-threshold: 50
            mcsv-notification:
                sliding-window-size: 10
                failure-rate-threshold: 50
                wait-duration-in-open-state: 30s
                permitted-number-of-calls-in-half-open-state: 3
            github-token-client:
                sliding-window-size: 5
                minimum-number-of-calls: 3
                failure-rate-threshold: 80
                wait-duration-in-open-state: 15s
                permitted-number-of-calls-in-half-open-state: 2
            github-api-client:
                sliding-window-size: 5
                minimum-number-of-calls: 3
                failure-rate-threshold: 80
                wait-duration-in-open-state: 15s
                permitted-number-of-calls-in-half-open-state: 2
    retry:
        instances:
            mcsv-user:
                max-attempts: 3
                wait-duration: 500ms
                enable-exponential-backoff: true
                exponential-backoff-multiplier: 2
            mcsv-notification:
                max-attempts: 2
                wait-duration: 500ms
                enable-exponential-backoff: true
            github-token-client:
                max-attempts: 2
                wait-duration: 1s
                enable-exponential-backoff: true
                exponential-backoff-multiplier: 2
            github-api-client:
                max-attempts: 2
                wait-duration: 1s
                enable-exponential-backoff: true
                exponential-backoff-multiplier: 2
