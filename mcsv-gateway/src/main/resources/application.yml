spring:
  application:
    name: mcsv-gateway
  profiles:
    active: dev
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
  data:
    redis:
      url: ${REDIS_URL}
  main:
    web-application-type: reactive
  cloud:
    config:
      enabled: false
    gateway:
      httpclient:
        websocket:
          max-frame-payload-length: 65536
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
            allowCredentials: true
            allowedHeaders:
              - Content-Type
              - Authorization
              - Connection
              - Upgrade
              - X-Device-Id
              - X-Username
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
      routes:
        - id: mcsv-auth
          uri: lb://mcsv-auth
          predicates:
            - Path=/v1/api/auth/**
          filters:
            - StripPrefix=3
            - name: CircuitBreaker
              args:
                name: mcsv-auth
                fallbackUri: forward:/fallback/mcsv-auth
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                key-resolver: "#{@ipKeyResolver}"
        - id: mcsv-user
          uri: lb://mcsv-user
          predicates:
            - Path=/v1/api/user/**
          filters:
            - StripPrefix=3
            - AuthFilter
            - name: CircuitBreaker
              args:
                name: mcsv-user
                fallbackUri: forward:/fallback/mcsv-user
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
        - id: mcsv-role
          uri: lb://mcsv-user
          predicates:
            - Path=/v1/api/role/**
          filters:
            - StripPrefix=2
            - AuthFilter
            - name: CircuitBreaker
              args:
                name: mcsv-role
                fallbackUri: forward:/fallback/mcsv-role
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
        - id: mcsv-select
          uri: lb://mcsv-user
          predicates:
            - Path=/v1/api/select/**
          filters:
            - StripPrefix=2
            - AuthFilter
            - name: CircuitBreaker
              args:
                name: mcsv-select
                fallbackUri: forward:/fallback/mcsv-user
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
        - id: mcsv-notification-ws
          uri: lb:ws://mcsv-notification
          predicates:
            - Path=/v1/api/notification/ws/**
          filters:
            - StripPrefix=3
        - id: mcsv-notification
          uri: lb://mcsv-notification
          predicates:
            - Path=/v1/api/notification/**
          filters:
            - StripPrefix=3
            - AuthFilter
            - name: CircuitBreaker
              args:
                name: mcsv-notification
                fallbackUri: forward:/fallback/mcsv-notification
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
        - id: mcsv-storage
          uri: lb://mcsv-storage
          predicates:
            - Path=/v1/api/storage/**
          filters:
            - StripPrefix=3
            - AuthFilter
            - name: CircuitBreaker
              args:
                name: mcsv-storage
                fallbackUri: forward:/fallback/mcsv-storage
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                key-resolver: "#{@userKeyResolver}"
        - id: mcsv-rrhh
          uri: lb://mcsv-rrhh
          predicates:
            - Path=/v1/api/rrhh/**
          filters:
            - StripPrefix=3
            - AuthFilter
            - name: CircuitBreaker
              args:
                name: mcsv-rrhh
                fallbackUri: forward:/fallback/mcsv-rrhh
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"
        - id: mcsv-project
          uri: lb://mcsv-project
          predicates:
            - Path=/v1/api/project/**
          filters:
            - StripPrefix=3
            - AuthFilter
            - name: CircuitBreaker
              args:
                name: mcsv-project
                fallbackUri: forward:/fallback/mcsv-project
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                key-resolver: "#{@userKeyResolver}"

server:
  port: 9090

jwt:
  secret: ${SECRET_KEY}
  expireAt: 480

# Zipkin's - telemetries
management:
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests:  true
  health:
    ratelimiters:
      enabled: ${ENABLE_TELEMETRICS:false}
  endpoints:
    jmx:
      exposure:
        exclude: '*'
    web:
      exposure:
        include: '*'
  tracing:
    sampling:
      probability: 1.0
    enabled: ${ENABLE_TELEMETRICS:false}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
  info:
    env:
      enabled: true

info:
  app:
    name: 'Gateway Server microservice'
    description: 'microservices for gateway in microservices'
    version: '1.0.0'

eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server:port}
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER:http://localhost:8761/eureka/}
      register-with-eureka: true

logging:
  level:
    org.springframework.cloud: trace
    org.springframework.web: trace
    org.springframework.gateway: trace
    com.tresit.mmc: debug
    com.tresit.gateway: debug

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  packagesToScan: com.cmr.mcsv_gateway

resilience4j:
  circuitbreaker:
    instances:
      mcsv-auth:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
      mcsv-user:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
      mcsv-role:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      mcsv-select:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      mcsv-notification:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
      mcsv-storage:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
      mcsv-rrhh:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
      mcsv-project:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        slow-call-duration-threshold: 3s
        slow-call-rate-threshold: 50
  retry:
    instances:
      mcsv-auth:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      mcsv-user:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
      mcsv-notification:
        max-attempts: 2
        wait-duration: 500ms
        enable-exponential-backoff: true
      mcsv-storage:
        max-attempts: 2
        wait-duration: 500ms
        enable-exponential-backoff: true
      mcsv-rrhh:
        max-attempts: 2
        wait-duration: 500ms
        enable-exponential-backoff: true
      mcsv-project:
        max-attempts: 2
        wait-duration: 500ms
        enable-exponential-backoff: true
